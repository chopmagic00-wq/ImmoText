<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImmoText - Modifica</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <nav class="bg-white shadow p-4 flex justify-between items-center">
        <h1 class="text-xl font-bold text-blue-600 cursor-pointer" onclick="window.location.href='dashboard.html'">← Torna alla Dashboard</h1>
        <button onclick="logout()" class="text-red-500 font-semibold hover:underline">Esci</button>
    </nav>

    <div class="container mx-auto p-6 max-w-6xl">
        <h2 class="text-2xl font-bold mb-6 text-gray-800">Immobile: <span id="nome-progetto" class="text-blue-600">...</span></h2>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-white p-6 rounded-lg shadow">
                <h3 class="text-lg font-semibold mb-4 text-gray-700">Specifiche Casa</h3>
                
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-600">Metri Quadri</label>
                    <input type="number" id="mq" class="w-full p-2 border rounded mt-1 outline-none focus:border-blue-500">
                </div>
                
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-600">Stanze</label>
                    <input type="text" id="stanze" placeholder="es. Trilocale, 2 bagni" class="w-full p-2 border rounded mt-1 outline-none focus:border-blue-500">
                </div>

                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-600">Zona</label>
                    <input type="text" id="zona" placeholder="es. Milano, Centro" class="w-full p-2 border rounded mt-1 outline-none focus:border-blue-500">
                </div>

                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-600">Note Extra</label>
                    <textarea id="note" class="w-full p-2 border rounded mt-1 h-32 outline-none focus:border-blue-500" placeholder="Terzo piano con ascensore, luminoso..."></textarea>
                </div>

                <button onclick="salvaEGeneraTesto()" id="btn-genera" class="w-full bg-blue-600 text-white p-3 rounded font-bold hover:bg-blue-700 transition">
                    ✨ Genera Descrizione con AI
                </button>
            </div>

            <div class="bg-white p-6 rounded-lg shadow flex flex-col justify-between border-t-4 border-blue-600">
                <div>
                    <h3 class="text-lg font-semibold mb-4 text-gray-700">Descrizione Generata</h3>
                    <div id="output-ai" class="text-gray-700 whitespace-pre-line bg-gray-50 p-4 rounded border h-80 overflow-y-auto italic">
                        Compila i campi a sinistra e clicca su Genera...
                    </div>
                </div>
                
                <button onclick="copiaTesto()" class="mt-4 bg-gray-800 text-white p-3 rounded font-bold hover:bg-gray-900 transition">
                    📋 Copia Testo
                </button>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
    <script>
        window.onload = async () => {
            await verificaAutenticazione();
            caricaDatiSingoloProgetto();
        };
    </script>
</body>
</html>
