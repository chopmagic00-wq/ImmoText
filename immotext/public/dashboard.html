<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImmoText - Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <nav class="bg-white shadow p-4 flex justify-between items-center">
        <h1 class="text-2xl font-bold text-blue-600 cursor-pointer" onclick="window.location.reload()">ImmoText</h1>
        <div class="flex items-center gap-4">
            <span class="bg-blue-100 text-blue-800 text-xs font-semibold px-2.5 py-0.5 rounded">Piano Base (9,99€)</span>
            <button onclick="logout()" class="text-red-500 font-semibold hover:underline">Esci</button>
        </div>
    </nav>

    <div class="container mx-auto p-6 max-w-5xl">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-bold text-gray-800">I tuoi Immobili</h2>
            <button onclick="creaNuovoProgetto()" class="bg-blue-600 text-white px-4 py-2 rounded font-bold hover:bg-blue-700 transition">+ Nuovo Progetto</button>
        </div>

        <div class="bg-white rounded-lg shadow overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-gray-50 border-b border-gray-200 text-gray-600 font-semibold text-sm">
                        <th class="p-4">Nome Immobile</th>
                        <th class="p-4">Data Creazione</th>
                        <th class="p-4 text-right text-gray-500 pr-10">Azioni</th>
                    </tr>
                </thead>
                <tbody id="tabella-progetti">
                    </tbody>
            </table>
        </div>
    </div>
    <script src="app.js"></script>
    <script>
        window.onload = async () => {
            await verificaAutenticazione();
            caricaProgetti();
        };
    </script>
</body>
</html>
