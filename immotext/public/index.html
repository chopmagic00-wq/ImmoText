<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImmoText - Accedi</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
        <h1 class="text-3xl font-bold text-center text-blue-600 mb-2">ImmoText</h1>
        <p class="text-center text-gray-500 mb-6">Crea descrizioni immobiliari in pochi secondi.</p>
        
        <div id="login-form">
            <h2 class="text-xl font-semibold mb-4 text-gray-700">Accedi</h2>
            <input type="email" id="email" placeholder="Email" class="w-full p-3 border rounded mb-3 outline-none focus:border-blue-500">
            <input type="password" id="password" placeholder="Password" class="w-full p-3 border rounded mb-4 outline-none focus:border-blue-500">
            <button onclick="login()" class="w-full bg-blue-600 text-white p-3 rounded font-bold hover:bg-blue-700 transition">Accedi</button>
            <p class="text-sm text-center mt-4 text-gray-600">Non hai un account? <span onclick="toggleForm()" class="text-blue-600 cursor-pointer underline">Registrati</span></p>
        </div>

        <div id="register-form" class="hidden">
            <h2 class="text-xl font-semibold mb-4 text-gray-700">Registrati (9,99€/mese)</h2>
            <input type="email" id="reg-email" placeholder="Email" class="w-full p-3 border rounded mb-3 outline-none focus:border-blue-500">
            <input type="password" id="reg-password" placeholder="Password (min. 6 caratteri)" class="w-full p-3 border rounded mb-4 outline-none focus:border-blue-500">
            <button onclick="registrati()" class="w-full bg-green-600 text-white p-3 rounded font-bold hover:bg-green-700 transition">Abbonati e Registrati</button>
            <p class="text-sm text-center mt-4 text-gray-600">Hai già un account? <span onclick="toggleForm()" class="text-blue-600 cursor-pointer underline">Accedi</span></p>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
